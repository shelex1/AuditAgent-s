# AntiHacker Council — example configuration.
# Скопируйте этот файл как `config/council.toml` и отредактируйте под себя.
#
# Роли участников: security-paranoid | pragmatic-engineer | adversarial-critic | code-quality | refactorer
#
# Провайдеры описаны в реестре [[providers]]. Каждый участник выбирает `provider`
# по имени и (опционально) объявляет упорядоченный список `fallbacks` — совет
# пройдёт по цепочке при ошибках `rate_limit` / `quota_exhausted`.

# ---------- Реестр провайдеров ----------

[[providers]]
name = "openrouter"
base_url = "https://openrouter.ai/api/v1"
api_key_env = "OPENROUTER_API_KEY"
# OpenRouter на бесплатном тарифе иногда отвечает 200 OK с пустым телом,
# когда квота исчерпана. Флаг превращает этот сигнал в ошибку
# `quota_exhausted`, чтобы совет перешёл на fallback, а не "молчал".
empty_means_quota = true

[[providers]]
name = "modal"
base_url = "https://api.us-west-2.modal.direct/v1"
api_key_env = "MODAL_API_KEY"

[[providers]]
name = "ollama"
base_url = "http://localhost:11434/v1"
# api_key_env не нужен — локальный Ollama Desktop работает без ключа.

# ---------- Участники совета ----------
# Ниже — пример реального 5-модельного совета на бесплатных моделях OpenRouter
# с fallback'ами на Modal (платные) и Ollama (локальный). Замените ID моделей
# на те, что вам доступны на ваших тарифах.

# ПРИМЕЧАНИЕ: некоторые модели помечены как :free временно. Проверяйте
# актуальность на https://openrouter.ai/models перед запуском.

[[members]]
name = "hermes-3-405b"
model = "nousresearch/hermes-3-llama-3.1-405b:free"
role = "security-paranoid"
timeout = 120
provider = "openrouter"
fallbacks = [
  { provider = "modal",  model = "zai-org/GLM-5-FP8-2" },
  { provider = "ollama", model = "minimax-m2.7:cloud" },
]

[[members]]
name = "glm-4.5-air"
model = "z-ai/glm-4.5-air:free"
role = "pragmatic-engineer"
timeout = 90
provider = "openrouter"
fallbacks = [
  { provider = "ollama", model = "minimax-m2.7:cloud" },
  { provider = "modal",  model = "zai-org/GLM-5-FP8-2" },
]

[[members]]
name = "gpt-oss-120b"
model = "openai/gpt-oss-120b:free"
role = "adversarial-critic"
timeout = 120
provider = "openrouter"
fallbacks = [
  { provider = "modal",  model = "zai-org/GLM-5-FP8-2" },
  { provider = "ollama", model = "minimax-m2.7:cloud" },
]

[[members]]
name = "nemotron-nano"
model = "nvidia/nemotron-3-nano-30b-a3b:free"
role = "code-quality"
timeout = 60
provider = "openrouter"
fallbacks = [
  { provider = "ollama", model = "minimax-m2.7:cloud" },
  { provider = "modal",  model = "zai-org/GLM-5-FP8-2" },
]

[[members]]
name = "nemotron-super"
model = "nvidia/nemotron-3-super-120b-a12b:free"
role = "refactorer"
timeout = 120
provider = "openrouter"
fallbacks = [
  { provider = "modal",  model = "zai-org/GLM-5-FP8-2" },
  { provider = "ollama", model = "minimax-m2.7:cloud" },
]

# ---------- Картограф ----------
# Быстрая модель, которая оценивает файлы по риску перед глубоким ревью.
# В этом примере переиспользуется nemotron-nano как самая лёгкая из совета.

[cartographer]
model = "nvidia/nemotron-3-nano-30b-a3b:free"
timeout = 90

# ---------- Лимиты ----------

[limits]
max_files_scan = 50
max_additional_file_requests = 3
debate_timeout = 300
per_member_timeout_fallback = 120
cache_ttl_seconds = 600
max_file_size_bytes = 51200
