# Fill in your 5-model council. Every member is used in every debate round.
# Role values: security-paranoid | pragmatic-engineer | adversarial-critic | code-quality | refactorer
#
# Providers are declared as a registry. Each member picks its primary
# `provider` by name and optionally declares an ordered `fallbacks` list —
# the council walks the chain on `rate_limit` / `quota_exhausted` errors.

# Provider registry
[[providers]]
name = "openrouter"
base_url = "https://openrouter.ai/api/v1"
api_key_env = "OPENROUTER_API_KEY"
# OpenRouter free tier sometimes returns 200 OK with an empty body when quota
# is exhausted. This flag promotes that signal to a `quota_exhausted` error
# kind so the fallback chain engages instead of abstaining.
empty_means_quota = true

[[providers]]
name = "modal"
base_url = "https://api.us-west-2.modal.direct/v1"
api_key_env = "MODAL_API_KEY"

[[providers]]
name = "ollama"
base_url = "http://localhost:11434/v1"
# api_key_env omitted — local Ollama Desktop needs no key.

[[members]]
name = "model-1"
model = "provider/model-id:free"
role = "security-paranoid"
timeout = 90
provider = "openrouter"
fallbacks = [
  { provider = "modal",  model = "provider/paid-model" },
  { provider = "ollama", model = "local-model:cloud" },
]

[[members]]
name = "model-2"
model = "provider/model-id:free"
role = "pragmatic-engineer"
timeout = 60
provider = "openrouter"
fallbacks = [
  { provider = "ollama", model = "local-model:cloud" },
  { provider = "modal",  model = "provider/paid-model" },
]

[[members]]
name = "model-3"
model = "provider/model-id:free"
role = "adversarial-critic"
timeout = 60
provider = "openrouter"
fallbacks = [
  { provider = "modal",  model = "provider/paid-model" },
  { provider = "ollama", model = "local-model:cloud" },
]

[[members]]
name = "model-4"
model = "provider/model-id:free"
role = "code-quality"
timeout = 60
provider = "openrouter"
fallbacks = [
  { provider = "ollama", model = "local-model:cloud" },
  { provider = "modal",  model = "provider/paid-model" },
]

[[members]]
name = "model-5"
model = "provider/model-id:free"
role = "refactorer"
timeout = 60
provider = "openrouter"
fallbacks = [
  { provider = "modal",  model = "provider/paid-model" },
  { provider = "ollama", model = "local-model:cloud" },
]

[cartographer]
model = "provider/fast-model:free"
timeout = 120

[limits]
max_files_scan = 50
max_additional_file_requests = 3
debate_timeout = 180
per_member_timeout_fallback = 90
cache_ttl_seconds = 600
max_file_size_bytes = 51200
